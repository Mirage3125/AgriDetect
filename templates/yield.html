<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>产量预测</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <main class="shell">
    <nav><a href="/">首页</a><a href="/disease">病害识别</a></nav>
    <h1>农作物产量预测</h1>
    <form id="yield-form" class="form-grid">
      <input name="temperature" type="number" step="0.01" placeholder="temperature" value="25">
      <input name="rainfall" type="number" step="0.01" placeholder="rainfall" value="95">
      <input name="humidity" type="number" step="0.01" placeholder="humidity" value="70">
      <input name="soil_moisture" type="number" step="0.01" placeholder="soil_moisture" value="41">
      <input name="soil_ph" type="number" step="0.01" placeholder="soil_ph" value="6.6">
      <input name="fertilizer_usage" type="number" step="0.01" placeholder="fertilizer_usage" value="185">
      <input name="planting_area" type="number" step="0.01" placeholder="planting_area" value="120">
      <input name="historical_yield" type="number" step="0.01" placeholder="historical_yield" value="7200">
      <button type="submit">预测</button>
      <button type="button" id="demo-yield">使用示例数据</button>
    </form>
    <p id="yield-message" class="message"></p>
    <section class="panel">
      <h2>预测结果</h2>
      <div class="metric-row">
        <span><strong id="yield-value">-</strong> kg/ha</span>
        <span id="yield-risk" class="badge">-</span>
        <span id="yield-delta">-</span>
      </div>
      <p id="yield-engine"></p>
      <p id="yield-interval"></p>
      <h3>敏感性分析</h3>
      <div class="table-wrap">
        <table>
          <thead><tr><th>场景</th><th>预测产量</th><th>影响</th></tr></thead>
          <tbody id="sensitivity-table"></tbody>
        </table>
      </div>
      <h3>管理建议</h3>
      <ul id="yield-recommendations" class="clean-list"></ul>
    </section>
    <section class="panel">
      <h2>近期历史产量</h2>
      <div class="table-wrap">
        <table>
          <thead><tr><th>年份</th><th>月份</th><th>产量</th></tr></thead>
          <tbody>
            {% for row in rows %}
            <tr><td>{{ row.year }}</td><td>{{ row.month }}</td><td>{{ row.crop_yield }}</td></tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </section>
  </main>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
